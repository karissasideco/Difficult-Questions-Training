<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Difficult Questions Practice | Acquisition.com Workshop Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --sambucus:#131628;
  --bg:#ffffff;
  --surface:#ffffff;
  --surface-2:#f4f4f8;
  --indigo:#6f00ff;
  --indigo-hover:#5c00d6;
  --lavender:#a08bec;
  --silver:#d1d1d1;
  --muted:#5b5f74;
  --white:#ffffff;
  --line:#e5e5ec;
  --success:#17804f;
  --success-bg:rgba(23,128,79,0.07);
  --danger:#c03a38;
  --danger-bg:rgba(192,58,56,0.07);
  --font-heading:"Poppins","Arial Black",Arial,sans-serif;
  --font-body:"Poppins",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--sambucus);
  font-family:var(--font-body);
  font-weight:300;
  line-height:1.75;
  min-height:100vh;
}
.shell{max-width:760px;margin:0 auto;padding:0 24px 64px;}
header.top{
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 0 20px;border-bottom:1px solid var(--line);margin-bottom:36px;
}
.brand{display:flex;align-items:center;gap:14px;}
.brand img{height:34px;width:auto;display:block;}
.brand .name{display:flex;flex-direction:column;line-height:1.25;}
.brand .name b{font-family:var(--font-heading);font-weight:800;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--sambucus);}
.brand .name span{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--indigo);}
button{
  font-family:var(--font-body);font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  font-size:12px;color:var(--sambucus);background:var(--surface);border:1px solid var(--silver);
  border-radius:8px;padding:10px 18px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;
}
button:hover{border-color:var(--indigo);}
button:active{transform:scale(.98);}
button:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;}
button.primary{background:var(--indigo);border-color:var(--indigo);color:var(--white);}
button.primary:hover{background:var(--indigo-hover);border-color:var(--indigo-hover);}
button.ghost{border-color:transparent;background:transparent;color:var(--muted);}
button.ghost:hover{color:var(--sambucus);border-color:var(--silver);}
.eyebrow{font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo);}
h1{font-family:var(--font-heading);font-weight:800;text-transform:uppercase;font-size:clamp(28px,5vw,40px);line-height:1.05;letter-spacing:.01em;margin:10px 0 14px;color:var(--sambucus);}
h2{font-family:var(--font-heading);font-weight:800;text-transform:uppercase;font-size:22px;line-height:1.1;margin:8px 0 10px;}
p.lead{color:var(--muted);font-size:16px;max-width:52ch;}
.hero{text-align:center;padding:16px 0 8px;}
.hero p.lead{margin:0 auto 32px;}
.modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;text-align:left;}
.mode{
  background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:26px 24px;
  cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;
}
.mode:hover{border-color:var(--lavender);transform:translateY(-2px);box-shadow:0 8px 24px rgba(19,22,40,0.07);}
.mode:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;}
.mode .tag{font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--indigo);}
.mode h3{font-family:var(--font-heading);font-weight:800;text-transform:uppercase;font-size:17px;margin:8px 0 8px;color:var(--sambucus);}
.mode p{color:var(--muted);font-size:14px;line-height:1.7;}
.hud{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.hud .stats{display:flex;gap:18px;font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.hud .stats b{color:var(--sambucus);}
.progress{height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-bottom:26px;}
.progress i{display:block;height:100%;background:var(--indigo);border-radius:3px;transition:width .3s ease;}
.qcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:28px;box-shadow:0 2px 10px rgba(19,22,40,0.04);}
.qcard .who{font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo);margin-bottom:10px;}
.qcard .qtext{font-size:19px;font-weight:300;line-height:1.6;color:var(--sambucus);}
.options{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
.opt{
  text-align:left;text-transform:none;letter-spacing:0;font-weight:300;font-size:15px;line-height:1.65;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px 18px;color:var(--sambucus);
}
.opt:hover:not([disabled]){border-color:var(--lavender);}
.opt[disabled]{cursor:default;}
.opt.correct{background:var(--success-bg);border-color:var(--success);color:var(--success);}
.opt.wrong{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
.feedback{margin-top:22px;}
.feedback .verdict{font-family:var(--font-heading);font-weight:800;text-transform:uppercase;font-size:15px;letter-spacing:.04em;margin-bottom:6px;}
.feedback .verdict.good{color:var(--success);}
.feedback .verdict.bad{color:var(--danger);}
.feedback .tip{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:18px;}
.feedback .tip b{color:var(--indigo);font-weight:600;}
.flip{perspective:1200px;margin-bottom:18px;}
.flip-inner{position:relative;transition:transform .5s;transform-style:preserve-3d;min-height:300px;}
.flip.revealed .flip-inner{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:28px;
  box-shadow:0 2px 10px rgba(19,22,40,0.04);
  display:flex;flex-direction:column;justify-content:center;
}
.face.back{transform:rotateY(180deg);justify-content:flex-start;overflow-y:auto;}
.face .who{font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo);margin-bottom:10px;}
.face .qtext{font-size:19px;line-height:1.6;color:var(--sambucus);}
.face .atext{font-size:15px;line-height:1.75;margin-bottom:14px;color:var(--sambucus);}
.face .tip{color:var(--muted);font-size:13px;line-height:1.7;border-top:1px solid var(--line);padding-top:12px;}
.face .tip b{color:var(--indigo);font-weight:600;}
.face .hint{margin-top:22px;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--silver);}
.nav-row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.results{text-align:center;padding:12px 0;}
.results .big{font-family:var(--font-heading);font-weight:800;font-size:clamp(44px,9vw,72px);line-height:1;color:var(--sambucus);}
.results .big span{color:var(--indigo);}
.results .msg{color:var(--muted);font-size:16px;margin:10px auto 30px;max-width:46ch;}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:480px;margin:0 auto 32px;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 12px;}
.stat .label{font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.stat .value{font-family:var(--font-heading);font-weight:800;font-size:26px;line-height:1.1;color:var(--sambucus);}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
footer{margin-top:56px;border-top:1px solid var(--line);padding-top:18px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
@media (max-width:560px){
  .hud .stats{gap:12px;font-size:11px;}
  .statgrid{grid-template-columns:1fr;}
  .qcard,.face{padding:22px;}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important;}
  .flip-inner{transition:none;}
}
</style>
</head>

<script>
const DATA=[
{q:"Can we use the gym downstairs?",a:"Great question! That's actually Alex's personal gym, so it isn't available to workshop guests.",tip:"Warm acknowledgment, clear boundary, no over-explaining.",wrong:["Sure! It's open to all guests during breaks.","Yes, but you'll need to sign a waiver at the front desk first.","No, and please don't ask about the private areas."]},
{q:"Can we use the upstairs restrooms? The line down here is short.",a:"The upstairs restrooms aren't available to guests right now, but the line moves quickly. It should only be a couple of minutes.",tip:"Hold the boundary, then reframe the wait positively.",wrong:["Go ahead, just be quick so no one notices.","Those are broken at the moment, sorry.","Yes, upstairs is open to everyone."]},
{q:"They're moving through the slides really quickly. Is there anything that can be done?",a:"We completely hear you! At the end of the event we'll send a summary of every presentation, so you won't miss a thing.",tip:"Validate the concern, then point to the summary that's coming.",wrong:["The pace is set, so there's nothing we can do.","Feel free to take photos of the slides instead.","I'll go ask the presenter to slow down right now."]},
{q:"Is Alex, Leila, or Sharran here? Can I speak with one of them?",a:"They travel quite a bit, so I'm not sure whether they're on-site right now. Is there anything I can help you with in the meantime?",tip:"Never confirm or deny their location. Pivot to how you can help.",wrong:["Yes, Alex is in his office. Go on up.","They never attend these events.","I can't share any information about that."]},
{q:"Why is there so much security? Is there a lot of crime around here?",a:"Not at all! We host a lot of CEOs and sometimes celebrities, so we keep security high to make sure everyone feels safe and comfortable.",tip:"Reassure first, then frame security as a positive.",wrong:["Yes, unfortunately this area has had some issues lately.","It's required by our insurance company.","I'm not allowed to discuss our security."]},
{q:"I brought something for Alex and Leila. Who can I give it to?",a:"That's so thoughtful, thank you! You can hand it to me and I'll pass it along to our security team so it gets to them.",tip:"Appreciate the gesture, then route it through security.",wrong:["You can leave it on their desk upstairs.","We can't accept anything for them, sorry.","Hold onto it. You might see them later today."]},
{q:"What time does the day end?",a:"The day wraps up at 5:00 PM.",tip:"Short and confident. Know the schedule cold.",wrong:["Around 6:30, depending on questions.","It varies. I'm not sure today.","The day ends at 4:00 PM."]},
{q:"Hi! I have a meeting with Erick or Dylan. Where do I go?",a:"Of course! Have a seat here on the couch and the team will come meet you. In the meantime, can I get you anything? Water or something to drink?",tip:"Seat them on the couch, notify the team, offer hospitality.",wrong:["Their offices are down the hall. Head on back.","Let me give you their cell numbers so you can text them.","They're probably busy. Check back with me later."]},
{q:"I really need to talk to someone on the Sales team. I don't want to continue with my purchase anymore.",a:"No worries at all. Have a seat here on the couch and I'll message the team to see who's available. Can you remind me of your name?",tip:"Stay calm and neutral. Never argue or push back. Seat, message, get the name.",wrong:["You'll need to email support to cancel. I can't help here.","Are you sure? That offer is really a great deal.","Sales doesn't take walk-ups. Try calling the hotline."]},
{q:"(Day 2) I need to speak with someone on the Sales team about the offer from yesterday.",a:"Absolutely! Have a seat here on the couch and I'll message the team to see who's available. Can you remind me of your name?",tip:"Same protocol as any sales request: couch, message the team, get the name.",wrong:["Yesterday's offer expired at midnight, unfortunately.","Try to catch them during lunch. They walk around.","I can answer questions about the offer myself."]},
{q:"Is there a quiet room or meditation room I can use?",a:"Yes, we do! Follow me and I'll show you where it is. It's in the video space on the left.",tip:"Walk them there personally. It's the office next to the sales book room.",wrong:["We don't have one, but the parking lot is pretty quiet.","You can use Alex's gym. It's usually empty.","The upstairs area is quiet if you want to head up."]},
{q:"I'm looking for my advisor but I can't find them. (They're not available.)",a:"It looks like they're not available at the moment. Is there something specific I can help you with?",tip:"Offer to help directly. If needed, route them to an available L1 advisor.",wrong:["They probably stepped out. Try wandering around to find them.","Advisors can't be interrupted during the event.","Here's their personal number. Give them a call."]},
{q:"I don't think I'm at the right roundtable. My revenue is very different from everyone else's. Can I switch tables?",a:"The roundtables were assigned based on the revenue submitted in your pre-work, but let me check with the team and see if there's anything we can do.",tip:"Explain the logic, then escalate. Don't promise a switch yourself.",wrong:["Feel free to move wherever you're comfortable.","The tables are final. No switching allowed.","They're random, so it doesn't really matter where you sit."]},
{q:"Are the roundtables assigned by industry?",a:"They're actually assigned based on revenue, not industry.",tip:"Simple factual correction. Revenue, not industry.",wrong:["Yes, everyone at your table is in your industry.","They're assigned alphabetically.","They're completely random."]},
{q:"The presentations are moving too fast and I can't write that fast. Can I take a picture of the slides?",a:"Unfortunately we don't allow photos of the presentations, but don't worry! You'll receive a summary of all the presentations at the end of the event.",tip:"No photos, ever. But always pair the no with the summary promise.",wrong:["Sure, just turn off your flash.","Photos are fine as long as you don't post them online.","No photos, and there's no other way to get the content."]}
];
const app=document.getElementById('app');
let quiz=null, study=null;
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function resetAll(){quiz=null;study=null;renderHome();}
document.getElementById('resetBtn').addEventListener('click',resetAll);

function renderHome(){
  app.innerHTML=`
  <section class="hero">
    <p class="eyebrow">Guest question training</p>
    <h1>Know every answer<br>before they ask</h1>
    <p class="lead">Fifteen real questions guests ask at the front desk, and the exact way our team answers them. Study first, then test yourself.</p>
    <div class="modes">
      <div class="mode" role="button" tabindex="0" id="modeStudy">
        <span class="tag">Learn</span>
        <h3>Study mode</h3>
        <p>Flip through flashcards at your own pace. See the question, reveal the answer, and read the coaching tip behind each one. Best for new team members.</p>
      </div>
      <div class="mode" role="button" tabindex="0" id="modeQuiz">
        <span class="tag">Test</span>
        <h3>Quiz mode</h3>
        <p>Pick the right response from realistic lookalikes. Score points, build a streak, and see your accuracy at the end.</p>
      </div>
    </div>
  </section>`;
  const s=document.getElementById('modeStudy'), q=document.getElementById('modeQuiz');
  const startStudy=()=>{study={order:shuffle(DATA),i:0,revealed:false};renderStudy();};
  const startQuiz=()=>{quiz={order:shuffle(DATA),i:0,score:0,streak:0,best:0,answered:false};renderQuiz();};
  s.onclick=startStudy;q.onclick=startQuiz;
  s.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();startStudy();}};
  q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();startQuiz();}};
}

function renderStudy(){
  const c=study.order[study.i];
  app.innerHTML=`
  <div class="hud">
    <button class="ghost" id="backBtn">&larr;&nbsp; Menu</button>
    <div class="stats"><span>Card <b>${study.i+1}</b> / ${study.order.length}</span></div>
  </div>
  <div class="progress"><i style="width:${Math.round((study.i+1)/study.order.length*100)}%"></i></div>
  <div class="flip${study.revealed?' revealed':''}" id="flipCard" role="button" tabindex="0" aria-label="Flashcard. Press enter to flip">
    <div class="flip-inner">
      <div class="face front">
        <div class="who">Guest asks</div>
        <div class="qtext">&ldquo;${esc(c.q)}&rdquo;</div>
        <div class="hint">Tap card to reveal the answer</div>
      </div>
      <div class="face back">
        <div class="who">You say</div>
        <div class="atext">${esc(c.a)}</div>
        <div class="tip"><b>Coach's tip</b> &middot; ${esc(c.tip)}</div>
        <div class="hint">Tap card to flip back</div>
      </div>
    </div>
  </div>
  <div class="nav-row">
    <button id="prevBtn">&larr;&nbsp; Previous</button>
    <button id="revealBtn" class="primary">${study.revealed?'Hide answer':'Reveal answer'}</button>
    <button id="nextBtn">Next &nbsp;&rarr;</button>
  </div>`;
  const flip=document.getElementById('flipCard');
  const toggle=()=>{study.revealed=!study.revealed;flip.classList.toggle('revealed');document.getElementById('revealBtn').textContent=study.revealed?'Hide answer':'Reveal answer';};
  flip.onclick=toggle;
  flip.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}};
  document.getElementById('revealBtn').onclick=e=>{e.stopPropagation();toggle();};
  document.getElementById('backBtn').onclick=renderHome;
  document.getElementById('prevBtn').onclick=()=>{study.i=(study.i-1+study.order.length)%study.order.length;study.revealed=false;renderStudy();};
  document.getElementById('nextBtn').onclick=()=>{study.i=(study.i+1)%study.order.length;study.revealed=false;renderStudy();};
}

function renderQuiz(){
  if(quiz.i>=quiz.order.length){return renderResults();}
  const c=quiz.order[quiz.i];
  const opts=shuffle([{t:c.a,ok:true}].concat(c.wrong.map(w=>({t:w,ok:false}))));
  app.innerHTML=`
  <div class="hud">
    <button class="ghost" id="backBtn">&larr;&nbsp; Menu</button>
    <div class="stats">
      <span>Question <b>${quiz.i+1}</b> / ${quiz.order.length}</span>
      <span>Score <b>${quiz.score}</b></span>
      <span>Streak <b>${quiz.streak}</b></span>
    </div>
  </div>
  <div class="progress"><i style="width:${Math.round(quiz.i/quiz.order.length*100)}%"></i></div>
  <div class="qcard">
    <div class="who">Guest asks</div>
    <div class="qtext">&ldquo;${esc(c.q)}&rdquo;</div>
  </div>
  <div class="options" id="opts"></div>
  <div class="feedback" id="fb"></div>`;
  document.getElementById('backBtn').onclick=renderHome;
  const list=document.getElementById('opts'), fb=document.getElementById('fb');
  const buttons=[];
  opts.forEach((o,idx)=>{
    const b=document.createElement('button');
    b.className='opt';b.innerHTML=esc(o.t);
    b.onclick=()=>{
      if(quiz.answered)return;
      quiz.answered=true;
      buttons.forEach(x=>x.disabled=true);
      let verdict;
      if(o.ok){
        quiz.score++;quiz.streak++;quiz.best=Math.max(quiz.best,quiz.streak);
        b.classList.add('correct');
        verdict='<div class="verdict good">Nailed it'+(quiz.streak>=3?'! '+quiz.streak+' in a row':'')+'</div>';
      }else{
        quiz.streak=0;
        b.classList.add('wrong');
        buttons.forEach((x,i2)=>{if(opts[i2].ok)x.classList.add('correct');});
        verdict='<div class="verdict bad">Not quite. The highlighted answer is the one we practice</div>';
      }
      fb.innerHTML=verdict+'<p class="tip"><b>Coach&rsquo;s tip</b> &middot; '+esc(c.tip)+'</p>';
      const next=document.createElement('button');
      next.className='primary';
      next.innerHTML=(quiz.i+1>=quiz.order.length?'See results':'Next question')+' &nbsp;&rarr;';
      next.onclick=()=>{quiz.i++;quiz.answered=false;renderQuiz();};
      fb.appendChild(next);
      next.focus();
    };
    list.appendChild(b);buttons.push(b);
  });
}

function renderResults(){
  const total=quiz.order.length, pct=Math.round(quiz.score/total*100);
  let msg='Keep practicing. Run study mode and come back for another round.';
  if(pct===100)msg='Perfect score. You are ready for the front desk.';
  else if(pct>=80)msg='Strong work! Just a couple of answers to tighten up.';
  else if(pct>=60)msg='Good foundation. Review the coach&rsquo;s tips and go again.';
  app.innerHTML=`
  <section class="results">
    <p class="eyebrow">Round complete</p>
    <div class="big">${quiz.score}<span>/${total}</span></div>
    <p class="msg">${msg}</p>
    <div class="statgrid">
      <div class="stat"><div class="label">Accuracy</div><div class="value">${pct}%</div></div>
      <div class="stat"><div class="label">Best streak</div><div class="value">${quiz.best}</div></div>
      <div class="stat"><div class="label">Questions</div><div class="value">${total}</div></div>
    </div>
    <div class="btn-row">
      <button class="primary" id="againBtn">Play again</button>
      <button id="studyBtn">Study mode</button>
      <button class="ghost" id="menuBtn">Back to menu</button>
    </div>
  </section>`;
  document.getElementById('againBtn').onclick=()=>{quiz={order:shuffle(DATA),i:0,score:0,streak:0,best:0,answered:false};renderQuiz();};
  document.getElementById('studyBtn').onclick=()=>{study={order:shuffle(DATA),i:0,revealed:false};renderStudy();};
  document.getElementById('menuBtn').onclick=renderHome;
}
renderHome();
</script>
